<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confluence PDF Exporter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f8fa;
            color: #2c3e50;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 28px 0;
            text-align: center;
            box-shadow: 0 2px 12px rgba(102, 126, 234, 0.3);
        }
        .header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
        .header p { font-size: 14px; opacity: 0.85; margin-top: 6px; }

        .container {
            max-width: 720px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8ecf1;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #edf0f4;
        }

        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #5a6577;
            margin-bottom: 6px;
        }
        label .hint {
            font-weight: 400;
            color: #9ca3b0;
            font-size: 12px;
        }

        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dce1e8;
            border-radius: 8px;
            font-size: 14px;
            color: #2c3e50;
            background: #fafbfc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.12);
            background: white;
        }
        input::placeholder { color: #b8bfc9; }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-preview {
            width: 120px;
            height: 48px;
            border: 1px solid #e2e6ec;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafbfc;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-preview img {
            max-width: 110px;
            max-height: 40px;
            object-fit: contain;
        }
        .logo-info {
            flex: 1;
            min-width: 0;
        }
        .logo-filename {
            font-size: 13px;
            color: #5a6577;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .logo-buttons {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #dce1e8;
            background: white;
            color: #5a6577;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-small:hover {
            background: #f0f2f5;
            border-color: #c5cad3;
        }

        .filename-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }
        .filename-row .badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 500;
            white-space: nowrap;
        }
        .badge-pdf { background: #fef2f2; color: #dc2626; }
        .badge-html { background: #eff6ff; color: #2563eb; }

        .dir-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: end;
        }
        .dir-row .btn-small {
            height: 38px;
            display: flex;
            align-items: center;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #667eea;
            cursor: pointer;
            flex-shrink: 0;
        }
        .checkbox-row label {
            margin-bottom: 0;
            font-size: 13px;
            font-weight: 500;
            color: #5a6577;
            cursor: pointer;
        }
        .file-group { transition: opacity 0.2s; }
        .file-group.disabled { opacity: 0.4; pointer-events: none; }

        .btn-export {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: -0.3px;
        }
        .btn-export:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.35);
        }
        .btn-export:active { transform: translateY(0); }
        .btn-export:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-area {
            display: none;
            margin-top: 20px;
        }
        .progress-area.visible { display: block; }

        .progress-log {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 10px;
            padding: 18px;
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 12.5px;
            line-height: 1.7;
            max-height: 260px;
            overflow-y: auto;
        }
        .progress-log .line { padding: 1px 0; }
        .progress-log .line.error { color: #f87171; }
        .progress-log .line.done { color: #4ade80; }
        .progress-log .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .result-area {
            display: none;
            margin-top: 16px;
        }
        .result-area.visible { display: block; }

        .result-files {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .result-file {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
        }
        .result-file .icon { font-size: 18px; }
        .result-file .info { flex: 1; min-width: 0; }
        .result-file .name { font-size: 13px; font-weight: 500; color: #166534; }
        .result-file .type { font-size: 11px; color: #86efac; }
        .result-file .btn-open {
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 6px;
            border: 1px solid #86efac;
            background: white;
            color: #166534;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .result-file .btn-open:hover {
            background: #dcfce7;
            border-color: #4ade80;
        }

        .result-error {
            padding: 12px 16px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 13px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #9ca3b0;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Confluence PDF Exporter</h1>
    <p>Confluence pages to Document PDF + Presentation HTML/PDF</p>
</div>

<div class="container">
    <!-- Page URL -->
    <div class="card">
        <div class="card-title">Confluence Page</div>
        <div class="form-group">
            <label for="pageUrl">Page URL</label>
            <input type="url" id="pageUrl"
                   placeholder="https://your-domain.atlassian.net/wiki/spaces/SPACE/pages/PAGE_ID/Title">
        </div>
    </div>

    <!-- Logo -->
    <div class="card">
        <div class="card-title">Logo</div>
        <div class="form-group">
            <div class="logo-section">
                <div class="logo-preview">
                    <img id="logoPreview" src="/static/pinklab_logo_text.png" alt="Logo">
                </div>
                <div class="logo-info">
                    <div class="logo-filename" id="logoFilename">pinklab_logo_text.png (default)</div>
                    <div class="logo-buttons">
                        <button class="btn-small" onclick="document.getElementById('fileInput').click()">Change</button>
                        <button class="btn-small" onclick="resetLogo()">Reset</button>
                    </div>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" onchange="uploadLogo(this)">
        </div>
    </div>

    <!-- Output Settings -->
    <div class="card">
        <div class="card-title">Output Settings</div>

        <div class="form-group">
            <label for="outputDir">Save Location</label>
            <input type="text" id="outputDir" placeholder="Loading...">
        </div>

        <div class="form-group">
            <div class="checkbox-row">
                <input type="checkbox" id="enableDocPdf" checked onchange="toggleFileGroup('docPdf')">
                <label for="enableDocPdf">Document PDF</label>
                <span class="badge badge-pdf">PDF</span>
            </div>
            <div class="file-group" id="docPdfGroup">
                <div class="filename-row">
                    <input type="text" id="docPdfName" placeholder="auto-generated from page title">
                </div>
            </div>
        </div>

        <div class="form-group">
            <div class="checkbox-row">
                <input type="checkbox" id="enablePresentHtml" checked onchange="toggleFileGroup('presentHtml')">
                <label for="enablePresentHtml">Presentation HTML</label>
                <span class="badge badge-html">HTML</span>
            </div>
            <div class="file-group" id="presentHtmlGroup">
                <div class="filename-row">
                    <input type="text" id="presentHtmlName" placeholder="auto-generated from page title">
                </div>
            </div>
        </div>

        <div class="form-group">
            <div class="checkbox-row">
                <input type="checkbox" id="enablePresentPdf" checked onchange="toggleFileGroup('presentPdf')">
                <label for="enablePresentPdf">Presentation PDF</label>
                <span class="badge badge-pdf">PDF</span>
            </div>
            <div class="file-group" id="presentPdfGroup">
                <div class="filename-row">
                    <input type="text" id="presentPdfName" placeholder="auto-generated from page title">
                </div>
            </div>
        </div>
    </div>

    <!-- Export Button -->
    <button class="btn-export" id="btnExport" onclick="startExport()">Export</button>

    <!-- Progress -->
    <div class="progress-area" id="progressArea">
        <div class="progress-log" id="progressLog"></div>
    </div>

    <!-- Result -->
    <div class="result-area" id="resultArea"></div>

    <div class="footer">Confluence PDF Exporter &mdash; PinkLAB</div>
</div>

<script>
    let customLogoPath = "";
    let pollingTimer = null;

    function toggleFileGroup(prefix) {
        const checked = document.getElementById(`enable${prefix.charAt(0).toUpperCase() + prefix.slice(1)}`).checked;
        // Map prefix to group ID
        const groupMap = { "docPdf": "docPdfGroup", "presentHtml": "presentHtmlGroup", "presentPdf": "presentPdfGroup" };
        const group = document.getElementById(groupMap[prefix]);
        if (group) {
            group.classList.toggle("disabled", !checked);
        }
    }

    // Load defaults on page load
    window.addEventListener("DOMContentLoaded", async () => {
        try {
            const res = await fetch("/api/defaults");
            const data = await res.json();
            document.getElementById("outputDir").value = data.default_output_dir;
            document.getElementById("outputDir").placeholder = data.default_output_dir;
        } catch (e) {
            console.error("Failed to load defaults:", e);
        }
    });

    async function uploadLogo(input) {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("logo", file);

        try {
            const res = await fetch("/api/logo/upload", { method: "POST", body: formData });
            const data = await res.json();
            if (data.error) { alert(data.error); return; }

            customLogoPath = data.path;
            document.getElementById("logoFilename").textContent = data.filename;

            // Preview
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById("logoPreview").src = e.target.result;
            };
            reader.readAsDataURL(file);
        } catch (e) {
            alert("Logo upload failed: " + e.message);
        }

        input.value = "";
    }

    async function resetLogo() {
        customLogoPath = "";
        document.getElementById("logoPreview").src = "/static/pinklab_logo_text.png";
        document.getElementById("logoFilename").textContent = "pinklab_logo_text.png (default)";
        await fetch("/api/logo/reset", { method: "POST" });
    }

    async function startExport() {
        const url = document.getElementById("pageUrl").value.trim();
        if (!url) {
            alert("Please enter a Confluence page URL.");
            document.getElementById("pageUrl").focus();
            return;
        }

        const btn = document.getElementById("btnExport");
        btn.disabled = true;
        btn.textContent = "Exporting...";

        const progressArea = document.getElementById("progressArea");
        const progressLog = document.getElementById("progressLog");
        const resultArea = document.getElementById("resultArea");

        progressArea.classList.add("visible");
        resultArea.classList.remove("visible");
        resultArea.innerHTML = "";
        progressLog.innerHTML = '<div class="line"><span class="spinner">&#9696;</span> Starting export...</div>';

        try {
            const res = await fetch("/api/export", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    url: url,
                    output_dir: document.getElementById("outputDir").value.trim(),
                    logo_path: customLogoPath,
                    doc_pdf_name: document.getElementById("docPdfName").value.trim(),
                    present_html_name: document.getElementById("presentHtmlName").value.trim(),
                    present_pdf_name: document.getElementById("presentPdfName").value.trim(),
                    enable_doc_pdf: document.getElementById("enableDocPdf").checked,
                    enable_present_html: document.getElementById("enablePresentHtml").checked,
                    enable_present_pdf: document.getElementById("enablePresentPdf").checked,
                }),
            });
            const data = await res.json();
            if (data.error) {
                showError(data.error);
                resetBtn();
                return;
            }

            pollStatus(data.job_id);
        } catch (e) {
            showError("Request failed: " + e.message);
            resetBtn();
        }
    }

    function pollStatus(jobId) {
        let lastLen = 0;

        pollingTimer = setInterval(async () => {
            try {
                const res = await fetch(`/api/status/${jobId}`);
                const job = await res.json();

                // Update log
                const logEl = document.getElementById("progressLog");
                if (job.progress && job.progress.length > lastLen) {
                    const newLines = job.progress.slice(lastLen);
                    for (const line of newLines) {
                        const div = document.createElement("div");
                        div.className = "line";
                        if (line.startsWith("Error")) div.className += " error";
                        if (line.includes("complete")) div.className += " done";
                        div.textContent = line;
                        logEl.appendChild(div);
                    }
                    lastLen = job.progress.length;
                    logEl.scrollTop = logEl.scrollHeight;
                }

                if (job.status === "done") {
                    clearInterval(pollingTimer);
                    showResult(job);
                    resetBtn();
                } else if (job.status === "error") {
                    clearInterval(pollingTimer);
                    showError(job.error || "Unknown error");
                    resetBtn();
                }
            } catch (e) {
                // ignore transient fetch errors
            }
        }, 500);
    }

    function showResult(job) {
        const area = document.getElementById("resultArea");
        area.classList.add("visible");

        let html = '<div class="result-files">';
        for (const f of job.files) {
            const icon = f.type.includes("HTML") ? "&#128196;" : "&#128462;";
            const fileUrl = `/api/files/${encodeURIComponent(f.path)}`;
            html += `<div class="result-file">
                <span class="icon">${icon}</span>
                <div class="info">
                    <div class="name">${f.name}</div>
                    <div class="type">${f.type}</div>
                </div>
                <a class="btn-open" href="${fileUrl}" target="_blank">Open</a>
            </div>`;
        }
        if (job.output_dir) {
            html += `<div style="padding: 8px 14px; font-size: 12px; color: #6b7280;">Saved to: ${job.output_dir}</div>`;
        }
        html += '</div>';
        area.innerHTML = html;
    }

    function showError(msg) {
        const area = document.getElementById("resultArea");
        area.classList.add("visible");
        area.innerHTML = `<div class="result-error">${msg}</div>`;
    }

    function resetBtn() {
        const btn = document.getElementById("btnExport");
        btn.disabled = false;
        btn.textContent = "Export";
    }
</script>

</body>
</html>
